<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qr-icon</title>
    <script type="module" crossorigin src="/nazo-qr/assets/index-DdJ0I66K.js"></script>
  </head>
  <body>
    <h2>ドット絵に擬態した QR コードを作るツール</h2>
    <p>
      ギリギリ読み取れる不思議な QR コードを作ります。
    </p>
    <p>
      <label for="text">埋め込むテキスト</label>
      <input id="text" type="text" value="" />
    </p>
    <p>
      <label for="img">画像を選択</label>
      <input id="img" type="file" />
    </p>
    <details>
      <summary>オプション</summary>
      <p>
        <label for="moduleSize">スケール</label>
        <input id="moduleSize" type="range" min="1" max="16" step="1" value="12" />
      </p>
      <p>
        <label for="dotSize">モジュールサイズ</label>
        <input id="dotSize" type="range" min="1" max="16" step="1" value="3" />
      </p>
      <p>
        <label for="sn">S/N</label>
        <input id="sn" type="range" min="0.00" max="0.5" step="0.01" value="0.01" />
      </p>
    </details>
    <p>※ ちゃんと読み取れる保証はないので、大事なシーンでは使わないで下さい。</p>
    <hr />
    <canvas id="render" />
  </body>
</html>
