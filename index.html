<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qr-icon</title>
  </head>
  <body>
    <h2>なぜか読み取れる QR コード</h2>
    <p>
      <label for="text">埋め込むテキスト</label>
      <input id="text" type="text" value="" />
    </p>
    <p>
      <label for="img">画像を選択</label>
      <input id="img" type="file" />
    </p>
    <details>
      <summary>オプション</summary>
      <p>
        <label for="moduleSize">スケール</label>
        <input id="moduleSize" type="range" min="1" max="20" step="1" value="8" />
      </p>
      <p>
        <label for="dotSize">モジュールサイズ</label>
        <input id="dotSize" type="range" min="1" max="20" step="1" value="2" />
      </p>
      <p>
        <label for="sn">S/N</label>
        <input id="sn" type="range" min="0.00" max="0.5" step="0.01" value="0.02" />
      </p>
    </details>
    <hr />
    <canvas id="render" />
    <script type="module" src="./main.js"></script>
  </body>
</html>
